name: First Interaction

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

concurrency:
  group: first-interaction-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  welcome:
    name: Welcome first-time contributors
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit

      - name: Greet
        uses: actions/first-interaction@3c71ce730280171fd1cfb57c00c774f8998586f7 # v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: >
            First issue. Acknowledgement within 7 days. Confirm reproduction
            steps, expected vs actual, environment. See SUPPORT.md.
          pr-message: >
            First PR. Confirm Conventional Commits, rebased on main, CI green.
            See CONTRIBUTING.md.
