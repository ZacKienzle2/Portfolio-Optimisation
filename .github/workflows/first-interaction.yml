name: First Interaction

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

concurrency:
  group: first-interaction-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  welcome:
    name: Welcome first-time contributors
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2
        with:
          egress-policy: audit

      - name: Greet
        uses: actions/first-interaction@1c4688942c71f71d4f5502a26ea67c331730fa4d # v3.1.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: >
            First issue. Acknowledgement within 7 days. Confirm reproduction
            steps, expected vs actual, environment. See SUPPORT.md.
          pr-message: >
            First PR. Confirm Conventional Commits, rebased on main, CI green.
            See CONTRIBUTING.md.
