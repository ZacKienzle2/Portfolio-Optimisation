name: Close stale issues and PRs

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch: {}

permissions:
  issues: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  stale:
    name: Mark and close stale items
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit

      - name: Stale
        uses: actions/stale@5bef64f19d7facfb25b37b414482c7164d639639 # v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          days-before-issue-stale: 60
          days-before-issue-close: 14
          days-before-pr-stale: 30
          days-before-pr-close: 14
          stale-issue-label: "stale"
          stale-pr-label: "stale"
          exempt-issue-labels: "pinned,security,help wanted,good first issue,blocked"
          exempt-pr-labels: "pinned,security,blocked,work-in-progress"
          exempt-all-milestones: true
          exempt-draft-pr: true
          stale-issue-message: >
            Marked stale due to inactivity. Closing in 14 days unless updated.
            Comment to keep open.
          close-issue-message: >
            Closed due to inactivity. Reopen if still relevant.
          stale-pr-message: >
            Marked stale due to inactivity. Closing in 14 days unless updated.
            Push or comment to keep open.
          close-pr-message: >
            Closed due to inactivity. Reopen when ready.
          operations-per-run: 200
          remove-stale-when-updated: true
          ascending: true
