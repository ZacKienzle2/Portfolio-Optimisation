name: Zizmor

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - ".github/actions/**"
      - ".zizmor.yml"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - ".github/actions/**"
      - ".zizmor.yml"
  schedule:
    - cron: "37 4 * * 1"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: zizmor-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  zizmor:
    name: Static analysis on workflows
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event.repository.private == false
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run zizmor
        env:
          ZIZMOR_VERSION: "1.5.2"
        run: |
          set -euo pipefail
          targets=(.github/workflows)
          if [ -d .github/actions ]; then targets+=(.github/actions); fi
          # zizmor exits 14 when findings are present and 0 when clean; we
          # want SARIF emitted either way and the workflow to fail only on
          # genuine errors. Save status, treat 14 as "had findings, ok".
          set +e
          pipx run --spec "zizmor==${ZIZMOR_VERSION}" zizmor \
            --format sarif \
            --config .zizmor.yml \
            "${targets[@]}" \
            > zizmor.sarif
          status=$?
          set -e
          if [ "${status}" -ne 0 ] && [ "${status}" -ne 14 ]; then
            echo "::error::zizmor exited ${status}"
            exit "${status}"
          fi
          if [ ! -s zizmor.sarif ]; then
            echo '{"version":"2.1.0","runs":[]}' > zizmor.sarif
          fi

      - name: Upload SARIF
        if: always() && hashFiles('zizmor.sarif') != ''
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v3
        with:
          sarif_file: zizmor.sarif
          category: zizmor
