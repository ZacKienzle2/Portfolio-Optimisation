name: Zizmor

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - ".github/actions/**"
      - ".zizmor.yml"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - ".github/actions/**"
      - ".zizmor.yml"
  schedule:
    - cron: "37 4 * * 1"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: zizmor-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  zizmor:
    name: Static analysis on workflows
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event.repository.private == false
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Run zizmor
        env:
          ZIZMOR_VERSION: "1.5.2"
        run: |
          set -euo pipefail
          pipx run --spec "zizmor==${ZIZMOR_VERSION}" zizmor \
            --format sarif \
            --config .zizmor.yml \
            .github/workflows .github/actions \
            > zizmor.sarif

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@458d36d7d4f47d0dd16ca424c1d3cda0060f1360 # v3
        with:
          sarif_file: zizmor.sarif
          category: zizmor
