name: Python

on:
  push:
    branches: [main]
    paths:
      - "portfolio_optimisation/**"
      - "tests/**"
      - "main.ipynb"
      - "pyproject.toml"
      - "uv.lock"
      - ".python-version"
      - ".github/workflows/python.yml"
  pull_request:
    branches: [main]
    paths:
      - "portfolio_optimisation/**"
      - "tests/**"
      - "main.ipynb"
      - "pyproject.toml"
      - "uv.lock"
      - ".python-version"
      - ".github/workflows/python.yml"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: python-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: ${{ matrix.python }} - lint, type-check, test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python: ["3.12", "3.13"]
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Pin Python ${{ matrix.python }}
        run: uv python pin ${{ matrix.python }}

      - name: Cache matplotlib + numba font/JIT directories
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4
        with:
          path: |
            ~/.cache/matplotlib
            ~/.numba_cache
          key: pycache-${{ runner.os }}-${{ matrix.python }}-${{ hashFiles('uv.lock') }}
          restore-keys: pycache-${{ runner.os }}-${{ matrix.python }}-

      - name: Sync dependencies
        run: uv sync --frozen --all-extras

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Pyright
        run: uv run pyright

      - name: Pytest with coverage
        run: uv run pytest -q --cov --cov-report=xml --cov-report=term

      - name: Upload coverage
        if: matrix.python == '3.12'
        uses: codecov/codecov-action@04b047e8bb82a0c002c8312c1c880fbc6a999d45 # v5
        with:
          files: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false

  build-wheel:
    name: Build wheel
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: python
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Build sdist + wheel
        run: uv build

      - name: Upload artefacts
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  notebook-smoke:
    name: Notebook execute smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: python
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Sync with notebooks extra
        run: uv sync --frozen --all-extras

      - name: Execute main.ipynb
        run: |
          set -euo pipefail
          uv run jupyter nbconvert \
            --to notebook \
            --execute \
            --output main-executed.ipynb \
            --ExecutePreprocessor.timeout=600 \
            main.ipynb
