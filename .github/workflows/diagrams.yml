name: Diagrams

on:
  push:
    branches: [main]
    paths:
      - "portfolio_optimisation/**"
      - "tools/gen_diagrams.py"
      - "docs/diagrams/**"
      - ".github/workflows/diagrams.yml"
  pull_request:
    branches: [main]
    paths:
      - "portfolio_optimisation/**"
      - "tools/gen_diagrams.py"
      - "docs/diagrams/**"
      - ".github/workflows/diagrams.yml"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: diagrams-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  diagrams:
    name: Verify architecture diagrams are in sync
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Check diagrams match source
        run: uv run python tools/gen_diagrams.py --check
