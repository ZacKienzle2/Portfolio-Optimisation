name: Diagrams

on:
  push:
    branches: [main]
    paths:
      - "portfolio_optimisation/**"
      - "tools/gen_diagrams.py"
      - "docs/diagrams/**"
      - ".github/workflows/diagrams.yml"
  pull_request:
    branches: [main]
    paths:
      - "portfolio_optimisation/**"
      - "tools/gen_diagrams.py"
      - "docs/diagrams/**"
      - ".github/workflows/diagrams.yml"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: diagrams-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  diagrams:
    name: Verify architecture diagrams are in sync
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Check diagrams match source
        run: uv run python tools/gen_diagrams.py --check
