name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "27 3 * * 1"
  workflow_dispatch: {}

permissions:
  contents: read
  security-events: write
  actions: read
  packages: read

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 360
    if: github.event.repository.private == false

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
            os: ubuntu-latest
          # Supported: c-cpp, csharp, go, java-kotlin, javascript-typescript,
          # python, ruby, rust, swift.
          # - language: python
          #   build-mode: none
          #   os: ubuntu-latest
          # - language: javascript-typescript
          #   build-mode: none
          #   os: ubuntu-latest
          # - language: c-cpp
          #   build-mode: autobuild
          #   os: ubuntu-latest
          # - language: rust
          #   build-mode: none
          #   os: ubuntu-latest

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@458d36d7d4f47d0dd16ca424c1d3cda0060f1360 # v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-extended,security-and-quality

      - name: Autobuild
        if: matrix.build-mode == 'autobuild'
        uses: github/codeql-action/autobuild@458d36d7d4f47d0dd16ca424c1d3cda0060f1360 # v3

      - name: Manual build placeholder
        if: matrix.build-mode == 'manual'
        run: |
          echo "::error::Manual build mode selected but no build steps defined."
          exit 1

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@458d36d7d4f47d0dd16ca424c1d3cda0060f1360 # v3
        with:
          category: "/language:${{ matrix.language }}"
          upload: always
