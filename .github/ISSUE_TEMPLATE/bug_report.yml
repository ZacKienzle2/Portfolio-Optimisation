name: Bug Report
description: Report a defect with reproducible steps.
title: "fix: <short description>"
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Complete every section. Reports without reproduction steps will be closed.

  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checks
      options:
        - label: I have searched existing issues and confirmed this is not a duplicate.
          required: true
        - label: I have reproduced this against the latest `main` branch.
          required: true
        - label: This is not a security issue. (Security issues go through SECURITY.md.)
          required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear, concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Numbered steps. Include code, commands, and inputs.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: Include error messages and logs verbatim.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / commit SHA
      placeholder: "v0.1.0 or 7-character SHA"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: true

  - type: input
    id: runtime
    attributes:
      label: Runtime / toolchain version
      placeholder: "e.g. Python 3.12.1, Node 20.11.0, GCC 13.2"

  - type: textarea
    id: logs
    attributes:
      label: Logs, stack traces, or screenshots
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Anything else that might help.
