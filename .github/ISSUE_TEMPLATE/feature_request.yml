name: Feature Request
description: Propose a new feature or enhancement.
title: "feat: <short description>"
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Complete every section.

  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checks
      options:
        - label: I have searched existing issues and discussions for similar proposals.
          required: true
        - label: This is a feature request, not a bug report.
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem does this feature solve? Who is affected?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the feature in detail. Include API sketches, CLI flags, or UI mocks where useful.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you evaluated and why they were rejected.

  - type: textarea
    id: usecases
    attributes:
      label: Use cases
      description: Concrete scenarios where this feature would be used.
    validations:
      required: true

  - type: dropdown
    id: breaking
    attributes:
      label: Backward compatibility
      options:
        - Non-breaking
        - Breaking change
        - Unsure
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Links, references, prior art, related issues.
