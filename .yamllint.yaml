extends: default

rules:
  line-length:
    max: 140
    level: warning
  document-start: disable
  truthy:
    allowed-values: ["true", "false", "on", "off"]
    check-keys: false
  comments:
    min-spaces-from-content: 1
  comments-indentation: disable
  indentation:
    spaces: 2
    indent-sequences: consistent

ignore: |
  node_modules/
  .git/
  .venv/
  dist/
  build/
  .pytest_cache/
  .ruff_cache/
  __pycache__/
