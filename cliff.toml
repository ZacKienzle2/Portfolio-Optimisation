# git-cliff configuration. Generates CHANGELOG.md from Conventional Commits.
# Regenerate locally with: uv run git-cliff -o CHANGELOG.md

[changelog]
header = """
# Changelog

All notable changes to this project are documented in this file.

The format is based on [Keep a Changelog 1.1.0](https://keepachangelog.com/en/1.1.0/),
and this project adheres to [Semantic Versioning 2.0.0](https://semver.org/spec/v2.0.0.html).

"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}
- {{ commit.message | split(pat=": ") | last | upper_first }}\
{% if commit.breaking %} (**breaking**){% endif %}\
{% endfor %}
{% endfor %}
"""
footer = ""
trim = false
postprocessors = [
  { pattern = '\(#([0-9]+)\)', replace = "([#${1}](https://github.com/ZacKienzle2/Portfolio-Optimisation/pull/${1}))" },
  { pattern = '\n{3,}', replace = "\n\n" },
  { pattern = '\n+\z', replace = "" },
]

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
protect_breaking_commits = true
filter_commits = true
tag_pattern = "v[0-9]*"
sort_commits = "oldest"
commit_parsers = [
  { message = "^feat", group = "<!-- 0 -->Added" },
  { message = "^fix", group = "<!-- 1 -->Fixed" },
  { message = "^perf", group = "<!-- 2 -->Changed" },
  { message = "^refactor", group = "<!-- 2 -->Changed" },
  { message = "^revert", group = "<!-- 2 -->Changed" },
  { message = "^docs", group = "<!-- 3 -->Documentation" },
  { body = ".*security", group = "<!-- 4 -->Security" },
  { message = "^style", skip = true },
  { message = "^test", skip = true },
  { message = "^chore", skip = true },
  { message = "^ci", skip = true },
  { message = "^build", skip = true },
  { message = "^.*", skip = true },
]
