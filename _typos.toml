[default]
# Skip identifiers that look like TeX theorem env names (thm/cor/lem/prop/defn).
extend-ignore-identifiers-re = [
  "^(thm|cor|lem|prop|defn)$",
]

[default.extend-words]
# Words that are real in this project even though typos flags them.
thm = "thm"

[files]
extend-exclude = [
  ".git/",
  "node_modules/",
  "dist/",
  "build/",
  "target/",
  "*.svg",
  "*.lock",
  "package-lock.json",
  "yarn.lock",
  "pnpm-lock.yaml",
  "poetry.lock",
  "Cargo.lock",
  "go.sum",
  "uv.lock",
  # External Zotero export; we do not edit author-supplied titles or keys.
  "references/references.bib",
  # LaTeX preamble uses 'thm' / 'lem' / 'cor' tcolorbox theorem keys.
  "preamble/packages.tex",
  # Generated notebook outputs (cell results) are not source.
  "main.ipynb",
]
